[package]
name = "coln-query"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "The query engine of the Coln language."
repository = "https://github.com/coln-project/Coln"
readme = "README.md"
exclude = [
    "/.editorconfig",
    "/.gitattributes",
    "/.gitignore",
    "/AGENTS.md",
    "/flake.nix",
    "/justfile",
    "/scripts/",
]

[features]
test = []

[dependencies]
anyhow = { workspace = true }
cli-table = "0.4.9"
dbsp = "0.305.0"
rkyv = { version = "0.7.46", default-features = false, features = [ "std", "size_64", "validation", "uuid", ] }
size-of = { version = "0.1.7", package = "feldera-size-of", features = [ "hashbrown", "time-std", "xxhash-xxh3", "arcstr", "chrono", "ordered-float", ] }
thiserror = { workspace = true }

[dev-dependencies]
criterion = { workspace = true }
