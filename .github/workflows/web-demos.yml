on:
  pull_request:
  push:
    branches: [main]

name: Web demos

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: web-demos-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/target
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

    steps:
      - name: Checkout ⬇️
        uses: actions/checkout@v6

      - name: Install Nix ❄️
        uses: cachix/install-nix-action@v31

      - name: Set up Cachix ♻️
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: cachix/cachix-action@v17
        with:
          name: coln
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Restore build caches
        uses: actions/cache@v4
        with:
          path: |
            .pnpm-store
            ~/.npm
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: web-demos-${{ runner.os }}-${{ hashFiles('flake.lock', 'Cargo.lock', 'packages/coln-js-runtime/package-lock.json', 'examples/sync-demo/pnpm-lock.yaml') }}
          restore-keys: |
            web-demos-${{ runner.os }}-

      - name: Build sync demo
        run: nix run --accept-flake-config .#sync-demo -- "$GITHUB_WORKSPACE"
        env:
          VITE_BASE: /sync/

