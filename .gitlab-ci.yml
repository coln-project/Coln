# Geolog LSP: Rust server + VS Code client
# Requires Rust and Node; uses a Rust image and installs Node in before_script.

variables:
  CARGO_HOME: ${CI_PROJECT_DIR}/.cargo

default:
  image: rust:1-bookworm
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl
    - curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
    - apt-get install -y -qq nodejs
    - rustc --version && node --version && npm --version

stages:
  - test
  - package

# Cache Cargo and npm to speed up jobs
.cache: &cache
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .cargo/
      - target/
      - client/node_modules/

# --- Test: build and run Rust tests, compile client ---
test:rust:
  stage: test
  <<: *cache
  script:
    - cargo build --release
    - cargo test

test:client:
  stage: test
  <<: *cache
  script:
    - cargo build --release
    - cd client && npm ci && npm run compile

# --- Package: produce .vsix (Linux) and save as artifact ---
package:vsix:
  stage: package
  <<: *cache
  script:
    - bash scripts/package.sh
  artifacts:
    paths:
      - client/*.vsix
    expire_in: 1 week
