[package]
name = "coln-store"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "The storage backend of the Coln language."
repository = "https://github.com/coln-project/Coln"
readme = "README.md"

exclude = [
    "/.editorconfig",
    "/.gitattributes",
    "/.gitignore",
    "/AGENTS.md",
    "/flake.nix",
    "/justfile",
    "/scripts/",
]

[dependencies]
anyhow.workspace = true
blake3 = "1.8.5"
clap = { version = "4.6.1", features = ["derive"], optional = true }
coln-flir-rs = { path = "../coln-flir-rs" }
csv = "1.4.0"
# coln-query = { path = "../coln-query" }
hex = "0.4.3"
hexane = { git = "https://github.com/automerge/automerge", branch = "hexane_v1", package = "hexane" }
js-sys = { version = "0.3.83", optional = true }
leb128 = "0.2.6"
petgraph = "0.8.3"
postcard = { version = "1.1.3", features = ["alloc"] }
rustyline = { version = "18.0.0", optional = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
shlex = "2.0.1"
sqlparser = "0.62.0"
thiserror = "2.0.18"
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = [
    "env-filter",
    "fmt",
], optional = true }


[dev-dependencies]
future_form = "0.3.1"
sedimentree_core = { git = "https://github.com/inkandswitch/subduction", features = [
    "std",
] }
subduction_core = { git = "https://github.com/inkandswitch/subduction", features = [
    "std",
    "test_utils",
] }
subduction_crypto = { git = "https://github.com/inkandswitch/subduction", features = [
    "std",
] }
subduction_websocket = { git = "https://github.com/inkandswitch/subduction", features = [
    "tokio_client",
    "tokio_server",
] }
tokio = { version = "1.52.3", features = [
    "macros",
    "net",
    "rt",
    "rt-multi-thread",
    "time",
] }

[features]
default = ["native"]
native = ["dep:rustyline", "dep:tracing-subscriber", "dep:clap"]
wasm = ["dep:js-sys"]

[[bin]]
name = "coln-store"
path = "src/main.rs"
required-features = ["native"]
