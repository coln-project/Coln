[package]
name = "coln-js-runtime"
version = "0.1.0"
edition = "2024"

[dependencies]
coln-store = { path = "../coln-store", default-features = false, features = [
  "wasm",
] }
console_error_panic_hook = "0.1.7"
hex = "0.4.3"
js-sys = "0.3.83"
serde = { version = "1", features = ["derive"] }
serde-wasm-bindgen = "0.6.5"
serde_json = "1.0.150"
tsify = "0.5.6"
wasm-bindgen = "0.2.123"

[lib]
crate-type = ["cdylib", "rlib"]
