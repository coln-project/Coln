on:
  pull_request:
  push:
    branches: [main]

name: Check

jobs:
  rust-fmt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ⬇️
        uses: actions/checkout@v6

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --check

  rust-clippy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ⬇️
        uses: actions/checkout@v6

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy

      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings

  rust-tests:
    runs-on: ubuntu-latest
    needs: [rust-fmt, rust-clippy]
    steps:
      - name: Checkout ⬇️
        uses: actions/checkout@v6

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Run tests
        run: cargo test

  haskell-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ⬇️
        uses: actions/checkout@v6

      - name: Install Nix ❄️
        uses: cachix/install-nix-action@v31

      - name: Set up Cachix ♻️
        uses: cachix/cachix-action@v17
        with:
          name: coln
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Run checks
        run: |
          RUN_CHECKS=$(nix build .#haskell-tests --no-link --print-out-paths)
          $RUN_CHECKS
          

