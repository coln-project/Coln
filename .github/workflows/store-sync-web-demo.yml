on:
  pull_request:
  push:
    branches: [main]

name: Store-sync web demo

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: store-sync-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/target
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

    steps:
      - name: Checkout ⬇️
        uses: actions/checkout@v6

      - name: Install Nix ❄️
        uses: cachix/install-nix-action@v31

      - name: Set up Cachix ♻️
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: cachix/cachix-action@v17
        with:
          name: coln
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Restore build caches
        uses: actions/cache@v4
        with:
          path: |
            .pnpm-store
            ~/.npm
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: store-sync-${{ runner.os }}-${{ hashFiles('flake.lock', 'Cargo.lock', 'packages/coln-js-runtime/package-lock.json', 'examples/pnpm-lock.yaml') }}
          restore-keys: |
            store-sync-${{ runner.os }}-

      - name: Build store-sync demo
        run: nix run --accept-flake-config .#store-sync-web-demo -- "$GITHUB_WORKSPACE"

      - name: Deploy PR preview to Netlify
        id: deploy-preview
        if: github.event_name == 'pull_request' && env.NETLIFY_AUTH_TOKEN != '' && env.NETLIFY_SITE_ID != ''
        run: |
          npx --yes netlify-cli@latest deploy \
            --auth "$NETLIFY_AUTH_TOKEN" \
            --site "$NETLIFY_SITE_ID" \
            --dir examples/store-sync/dist \
            --no-build \
            --alias "pr-${{ github.event.pull_request.number }}" \
            --message "PR #${{ github.event.pull_request.number }} store-sync demo" \
            --json > netlify-deploy.json

          cat netlify-deploy.json
          deploy_url=$(node -e "const d = require('./netlify-deploy.json'); console.log(d.deploy_ssl_url || d.ssl_url || d.deploy_url || d.url)")
          echo "deploy-url=$deploy_url" >> "$GITHUB_OUTPUT"

      - name: Comment with deploy preview URL
        if: github.event_name == 'pull_request' && steps.deploy-preview.outputs.deploy-url != ''
        uses: actions/github-script@v8
        with:
          script: |
            const marker = '<!-- coln-store-sync-deploy-preview -->'
            const body = `${marker}\nStore-sync demo preview: ${{ steps.deploy-preview.outputs.deploy-url }}`
            const { owner, repo } = context.repo
            const issue_number = context.issue.number
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 })
            const existing = comments.data.find(comment => comment.body?.includes(marker))
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body })
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body })
            }

      - name: Deploy main to Netlify production
        if: github.event_name == 'push' && env.NETLIFY_AUTH_TOKEN != '' && env.NETLIFY_SITE_ID != ''
        run: |
          npx --yes netlify-cli@latest deploy \
            --auth "$NETLIFY_AUTH_TOKEN" \
            --site "$NETLIFY_SITE_ID" \
            --dir examples/store-sync/dist \
            --no-build \
            --prod \
            --message "main store-sync demo ${{ github.sha }}"
