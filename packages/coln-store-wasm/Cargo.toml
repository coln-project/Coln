[package]
name = "coln-store-wasm"
version = "0.1.0"
edition = "2024"

[dependencies]
coln-store = { path = "../coln-store", default-features = false, features = [
  "wasm",
] }
hex = "0.4.3"
serde = { version = "1", features = ["derive"] }
serde-wasm-bindgen = "0.6.5"
serde_json = "1.0.150"
wasm-bindgen = "0.2.123"

[lib]
crate-type = ["cdylib", "rlib"]
