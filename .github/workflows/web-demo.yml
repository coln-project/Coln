on:
  pull_request:
  push:
    branches: [main]

name: Web apps

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: web-apps-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/target
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

    steps:
      - name: Checkout ⬇️
        uses: actions/checkout@v6

      - name: Install Nix ❄️
        uses: cachix/install-nix-action@v31

      - name: Set up Cachix ♻️
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: cachix/cachix-action@v17
        with:
          name: coln
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Restore build caches
        uses: actions/cache@v4
        with:
          path: |
            .pnpm-store
            ~/.npm
            ~/.cargo/registry
            ~/.cargo/git
            ~/.ghc-wasm/.cabal
            target
            dist-newstyle
          key: web-apps-${{ runner.os }}-${{ hashFiles('flake.lock', 'Cargo.lock', 'cabal.project', 'packages/**/*.cabal', 'packages/coln-js-runtime/package-lock.json', 'examples/web-demo/pnpm-lock.yaml') }}
          restore-keys: |
            web-apps-${{ runner.os }}-

      - name: Build web demo
        run: nix run --accept-flake-config .#web-demo -- "$GITHUB_WORKSPACE"

      - name: Update wasm cabal package index
        run: nix develop --accept-flake-config --command wasm32-wasi-cabal update

      - name: Build web compiler
        run: nix develop --accept-flake-config --command just packages/coln-compiler-wasm/build-example

      - name: Assemble deploy directory
        run: |
          mkdir -p _deploy/demo _deploy/compiler
          cp -r examples/web-demo/dist/* _deploy/demo/
          cp -r _build/wasm/* _deploy/compiler/
          cat > _deploy/index.html <<'EOF'
          <!doctype html>
          <meta charset="utf-8">
          <title>Coln</title>
          <ul>
          <li><a href="/demo/">Demo</a></li>
          <li><a href="/compiler/">Compiler</a></li>
          </ul>
          EOF

      - name: Deploy PR preview to Netlify
        id: deploy-preview
        if: github.event_name == 'pull_request' && env.NETLIFY_AUTH_TOKEN != '' && env.NETLIFY_SITE_ID != ''
        run: |
          npx --yes netlify-cli@latest deploy \
            --auth "$NETLIFY_AUTH_TOKEN" \
            --site "$NETLIFY_SITE_ID" \
            --dir _deploy \
            --no-build \
            --alias "pr-${{ github.event.pull_request.number }}" \
            --message "PR #${{ github.event.pull_request.number }} web apps" \
            --json > netlify-deploy.json

          cat netlify-deploy.json
          deploy_url=$(node -e "const d = require('./netlify-deploy.json'); console.log(d.deploy_ssl_url || d.ssl_url || d.deploy_url || d.url)")
          echo "deploy-url=$deploy_url" >> "$GITHUB_OUTPUT"

      - name: Comment with deploy preview URL
        if: github.event_name == 'pull_request' && steps.deploy-preview.outputs.deploy-url != ''
        uses: actions/github-script@v8
        with:
          script: |
            const marker = '<!-- coln-web-apps-deploy-preview -->'
            const url = '${{ steps.deploy-preview.outputs.deploy-url }}'
            const body = [
              marker,
              'Deploy preview:',
              `- [Demo](${url}/demo/)`,
              `- [Compiler](${url}/compiler/)`,
            ].join('\n')
            const { owner, repo } = context.repo
            const issue_number = context.issue.number
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 })
            const existing = comments.data.find(comment => comment.body?.includes(marker))
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body })
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body })
            }

      - name: Deploy main to Netlify production
        if: github.event_name == 'push' && env.NETLIFY_AUTH_TOKEN != '' && env.NETLIFY_SITE_ID != ''
        run: |
          npx --yes netlify-cli@latest deploy \
            --auth "$NETLIFY_AUTH_TOKEN" \
            --site "$NETLIFY_SITE_ID" \
            --dir _deploy \
            --no-build \
            --prod \
            --message "main web apps ${{ github.sha }}"
