<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Coln</title>
    <style>
      body {
        --hue: 220;
        --sat: 32%;
        --main-bg: hsl(var(--hue), var(--sat), 16%);
        --input-bg: hsl(var(--hue), var(--sat), 8%);
        --alt-bg: hsl(var(--hue), var(--sat), 13%);
        --border: hsl(var(--hue), var(--sat), 30%);
        --accent: hsl(var(--hue), var(--sat), 75%);
        --text-hue: 39;
        --text-sat: 70%;
        --text: hsl(var(--text-hue), var(--text-sat), 88%);
        --debug: hsl(290, var(--text-sat), 55%);
        --info: hsl(215, var(--text-sat), 55%);
        --warning: hsl(45, var(--text-sat), 55%);
        --error: hsl(355, var(--text-sat), 55%);
        font-family: Helvetica, Arial, sans-serif;
        background: var(--main-bg);
        color: var(--text);
        max-width: 60em;
        margin: 2em auto;
        > * {
          margin: 0 1em;
        }
      }
      textarea,
      pre {
        padding: 0.8em 1em;
      }
      textarea,
      select {
        color: inherit;
        &:focus {
          border-color: var(--accent);
          outline: none;
        }
      }
      textarea {
        background: var(--input-bg);
        resize: vertical;
        border: solid 1px var(--border);
      }
      pre {
        margin: 0;
        white-space: pre-wrap;
      }
      select {
        background: var(--input-bg);
        border: solid 1px var(--border);
        padding: 0.5em 1em;
      }
      body[data-compiling] {
        & .output {
          opacity: 0.5;
        }
      }
      .main {
        display: grid;
        grid-template-columns: auto 1fr;
        grid-template-rows: auto auto repeat(3, minmax(2.5em, auto));
        gap: 1em 1em;
        > h2 {
          text-align: right;
        }
        > * {
          margin: 0;
        }
      }
      .header {
        grid-column: 1 / -1;
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1em;
        > h1 {
          padding-left: 3em;
          margin: 0;
        }
      }
      #input,
      #examples,
      .output {
        border-radius: 0.3em;
      }
      .output {
        border: solid 1px var(--border);
        background: var(--alt-bg);
        > div:not(:last-child) {
          border-bottom: solid 1px var(--border);
        }
      }
      #json {
        padding: 1em;
      }
      .diag-debug {
        --diag-colour: var(--debug);
      }
      .diag-info {
        --diag-colour: var(--info);
      }
      .diag-warning {
        --diag-colour: var(--warning);
      }
      .diag-error {
        --diag-colour: var(--error);
      }
      [class^="ann-"] {
        color: var(--diag-colour);
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="main">
      <div class="header">
        <h1>Coln</h1>
        <select id="examples">
          <option value="">—</option>
        </select>
      </div>
      <h2>Source</h2>
      <textarea id="input" spellcheck="false" rows="15"></textarea>
      <h2>Diagnostics</h2>
      <div class="output" id="diagnostics"></div>
      <h2>IR</h2>
      <div class="output" id="pretty"></div>
      <h2>JSON</h2>
      <pre class="output" id="json"></pre>
    </div>

    <script type="module">
      import {
        WASI,
        OpenFile,
        File,
        ConsoleStdout,
      } from "https://cdn.jsdelivr.net/npm/@bjorn3/browser_wasi_shim@0.3.0/dist/index.js";
      import ghc_wasm_jsffi from "./dist/ghc_wasm_jsffi.js";

      const inputEl = document.getElementById("input");
      const diagsEl = document.getElementById("diagnostics");
      const prettyEl = document.getElementById("pretty");
      const jsonEl = document.getElementById("json");
      const examplesEl = document.getElementById("examples");
      const exampleFiles = await fetch("examples/index.json").then((r) =>
        r.json(),
      );
      for (const name of exampleFiles) {
        const opt = document.createElement("option");
        opt.value = name;
        opt.textContent = name.split(".")[0];
        examplesEl.appendChild(opt);
      }
      examplesEl.addEventListener("change", async () => {
        if (!examplesEl.value) {
          inputEl.value = "";
          diagsEl.replaceChildren();
          prettyEl.replaceChildren();
          jsonEl.textContent = "";
        } else {
          inputEl.value = await fetch("examples/" + examplesEl.value).then(
            (r) => r.text(),
          );
          run();
        }
      });

      const wasi = new WASI(
        [],
        [],
        [
          new OpenFile(new File([])),
          ConsoleStdout.lineBuffered(console.log),
          ConsoleStdout.lineBuffered(console.error),
        ],
      );

      const exports = {};
      const { instance } = await WebAssembly.instantiateStreaming(
        fetch("dist/coln.wasm"),
        {
          wasi_snapshot_preview1: wasi.wasiImport,
          ghc_wasm_jsffi: ghc_wasm_jsffi(exports),
        },
      );
      Object.assign(exports, instance.exports);
      const compileResultRegistry = new FinalizationRegistry(
        exports.freeCompileResult,
      );
      class CompileResult {
        #ptr;
        constructor(ptr) {
          this.#ptr = ptr;
          compileResultRegistry.register(this, ptr);
        }
        get diagnostics() {
          return exports.getDiagnostics(true, this.#ptr);
        }
        get prettyIr() {
          return exports.prettyIr(this.#ptr);
        }
        get irToJson() {
          return exports.irToJson(this.#ptr);
        }
      }
      const compile = async (src) =>
        new CompileResult(await exports.compile(src));

      wasi.initialize(instance);

      async function run() {
        document.body.dataset.compiling = "";
        const result = await compile(inputEl.value);
        prettyEl.replaceChildren(
          ...(await result.prettyIr).map((chunk) => {
            const pre = document.createElement("pre");
            pre.innerHTML = chunk;
            return pre;
          }),
        );
        diagsEl.replaceChildren(
          ...(await result.diagnostics).map((chunk) => {
            const pre = document.createElement("div");
            pre.innerHTML = chunk;
            return pre;
          }),
        );
        jsonEl.textContent = await result.irToJson;
        delete document.body.dataset.compiling;
      }

      let debounceTimer;
      inputEl.addEventListener("input", () => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(run, 50);
      });

      run();
    </script>
  </body>
</html>
